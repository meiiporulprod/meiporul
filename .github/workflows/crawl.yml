name: News Crawler

on:
  schedule:
    - cron: "*/30 * * * *"   # every 30 minutes
  workflow_dispatch:          # allow manual trigger from GitHub UI

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install requests beautifulsoup4 feedparser supabase python-dotenv

      - name: Check secrets
        run: |
          echo "SUPABASE_URL set: $([ -n '${{ secrets.SUPABASE_URL }}' ] && echo YES || echo NO)"
          echo "SERVICE_KEY set: $([ -n '${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}' ] && echo YES || echo NO)"

      - name: Run crawler
        working-directory: crawler
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python crawl.py
